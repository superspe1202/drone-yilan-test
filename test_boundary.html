<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八仙段 土地邊界測試</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft JhengHei', sans-serif; display: flex; height: 100vh; }
        @media (max-width: 768px) { body { flex-direction: column; } .sidebar { width: 100%; height: auto; max-height: 40vh; } .map-container { height: 60vh; } }
        .sidebar { width: 320px; background: linear-gradient(180deg, #667eea 0%, #764ba2 100%); padding: 15px; color: white; display: flex; flex-direction: column; }
        .sidebar h1 { font-size: 18px; margin-bottom: 10px; }
        .btn-location { background: #4CAF50; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-bottom: 10px; }
        .selected-list { flex: 1; overflow-y: auto; margin-bottom: 10px; }
        .selected-item { background: white; color: #333; border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .selected-item:hover { background: #f0f0f0; }
        .selected-item .info { flex: 1; }
        .selected-item .land-no { font-weight: bold; color: #667eea; }
        .selected-item .area { font-size: 13px; color: #666; }
        .selected-item .price { font-size: 14px; font-weight: bold; }
        .btn-delete { background: #ff4444; color: white; border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; margin-left: 8px; }
        .total-box { background: rgba(255,255,255,0.2); padding: 12px; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        .form-group { margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 8px; border: none; border-radius: 6px; }
        .btn-submit { background: #ff6b35; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; }
        .empty-state { text-align: center; padding: 20px; opacity: 0.8; }
        .map-container { flex: 1; position: relative; }
        #map { height: 100%; }
        .layer-control { position: absolute; top: 10px; right: 10px; background: white; padding: 10px; border-radius: 8px; z-index: 1000; font-size: 13px; }
        .legend { position: absolute; bottom: 20px; right: 10px; background: white; padding: 8px; border-radius: 8px; z-index: 1000; font-size: 12px; }
        .loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: white; padding: 20px; border-radius: 8px; z-index: 2000; display: none; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h1>🚁 無人機農噴 - 邊界測試版</h1>
        <button class="btn-location" onclick="getLocation()">📍 定位我的位置</button>
        <div class="selected-list" id="selectedList"><div class="empty-state">👆 點擊紅色邊界選擇土地</div></div>
        <div class="total-box"><div class="label">總費用 (每分 $300)</div><div class="total" id="totalPrice">$0</div></div>
        <div class="form-group"><input type="text" id="name" placeholder="姓名"></div>
        <div class="form-group"><input type="tel" id="phone" placeholder="電話"></div>
        <button class="btn-submit" onclick="submitOrder()">📢 送出媒合</button>
    </div>
    <div class="map-container">
        <div id="map"></div>
        <div class="layer-control">
            <label><input type="radio" name="basemap" value="osm" checked> OSM</label>
            <label><input type="radio" name="basemap" value="sat"> Google 衛星</label>
            <hr>
            <label><input type="checkbox" id="cadas" checked> 地籍圖</label>
            <hr>
            <label><input type="checkbox" id="showBoundaries" checked> 顯示邊界</label>
        </div>
        <div class="legend">
            <div>🔴 邊界（可點擊）</div>
            <div>🟠 已選取</div>
        </div>
        <div class="loading" id="loading">載入邊界資料中...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        var selectedLands = [];
        
        var map = L.map('map').setView([24.663, 121.789], 17);
        L.control.scale({imperial:false, metric:true}).addTo(map);
        
        var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:22});
        var satellite = L.tileLayer('https://{s}.google.com/vt/lyrs=s&x={x}&y={y}&z={z}',{maxZoom:22,subdomains:['mt0','mt1','mt2','mt3']});
        var wmts = L.tileLayer('https://maptiles.591.com.tw/S_Maps/wmts/DMAPS/default/GoogleMapsCompatible/{z}/{y}/{x}',{maxZoom:22,minZoom:10,opacity:0.9,zIndex:100});
        
        osm.addTo(map); wmts.addTo(map);
        
        // 地圖切換
        document.querySelectorAll('input[name="basemap"]').forEach(function(r){
            r.onchange=function(){
                if(this.value==='osm'){map.removeLayer(satellite);osm.addTo(map);}
                else{map.removeLayer(osm);satellite.addTo(map);}
                if(!map.hasLayer(wmts))wmts.addTo(map);
            };
        });
        document.getElementById('cadas').onchange=function(){
            if(this.checked)wmts.addTo(map);
            else map.removeLayer(wmts);
        };
        
        // 邊界圖層
        var boundaryLayer = L.geoJSON(null, {
            style: { color: "#ff0000", weight: 2, fillOpacity: 0.15, fillColor: "#ff0000" },
            onEachFeature: function(feature, layer) {
                layer.on('click', function() {
                    toggleLand(feature.properties.land_no);
                });
            }
        }).addTo(map);
        
        // 選擇顯示/隱藏邊界
        document.getElementById('showBoundaries').onchange=function(){
            if(this.checked){
                map.addLayer(boundaryLayer);
            }else{
                map.removeLayer(boundaryLayer);
            }
        };
        
        // 載入邊界資料
        var areaMap = {"1":4023.08,"2":15.13,"3":85.17,"4":92.82,"5":44.8,"6":20.74,"7":39.04,"8":68.46,"9":129.67,"10":674.38};
        
        function loadBoundaries() {
            document.getElementById('loading').style.display = 'block';
            
            // 使用 jsDelivr CDN 載入
            var boundaryUrl = 'https://cdn.jsdelivr.net/gh/superspe1202/drone-yilan-test@main/baxian_boundaries_final.json';
            
            fetch(boundaryUrl)
                .then(function(response){return response.json();})
                .then(function(data){
                    boundaryLayer.addData(data);
                    document.getElementById('loading').style.display = 'none';
                    console.log('載入 ' + data.features.length + ' 塊邊界');
                })
                .catch(function(e){
                    console.error(e);
                    document.getElementById('loading').innerText = '載入失敗，請檢查網路';
                });
        }
        
        loadBoundaries();
        
        function toggleLand(landNo) {
            var idx = selectedLands.findIndex(function(l){return l.landNo===landNo;});
            var area = areaMap[landNo] || 0;
            
            if(idx>=0){
                selectedLands.splice(idx,1);
                boundaryLayer.eachLayer(function(layer){
                    if(layer.feature.properties.land_no === landNo){
                        layer.setStyle({color: "#ff0000", fillColor: "#ff0000", fillOpacity: 0.15});
                    }
                });
            }else if(area > 0){
                selectedLands.push({landNo: landNo, area: area});
                boundaryLayer.eachLayer(function(layer){
                    if(layer.feature.properties.land_no === landNo){
                        layer.setStyle({color: "#ff6b35", fillColor: "#ff6b35", fillOpacity: 0.4});
                    }
                });
            }
            renderSelectedList();
        }
        
        function removeLand(idx, e){
            e.stopPropagation();
            var land = selectedLands[idx];
            selectedLands.splice(idx,1);
            boundaryLayer.eachLayer(function(layer){
                if(layer.feature.properties.land_no === land.landNo){
                    layer.setStyle({color: "#ff0000", fillColor: "#ff0000", fillOpacity: 0.15});
                }
            });
            renderSelectedList();
        }
        
        function focusLand(idx){
            var land = selectedLands[idx];
            var layer = null;
            boundaryLayer.eachLayer(function(l){
                if(l.feature.properties.land_no === land.landNo){
                    layer = l;
                }
            });
            if(layer){
                map.fitBounds(layer.getBounds());
            }
        }
        
        function renderSelectedList(){
            var list = document.getElementById('selectedList');
            if(selectedLands.length===0){
                list.innerHTML='<div class="empty-state">👆 點擊紅色邊界選擇土地</div>';
                document.getElementById('totalPrice').innerText='$0';
                return;
            }
            var html='';
            var totalFen=0;
            selectedLands.forEach(function(l,idx){
                var fen=l.area/293.4;
                totalFen+=fen;
                var price=Math.round(fen*300);
                html+='<div class="selected-item" onclick="focusLand('+idx+')"><div class="info"><div class="land-no">'+l.landNo+' 地號</div><div class="area">'+l.area.toFixed(1)+' 坪 = '+fen.toFixed(1)+' 分</div><div class="price">$'+price.toLocaleString()+'</div></div><button class="btn-delete" onclick="removeLand('+idx+',event)">×</button></div>';
            });
            var totalPrice=Math.round(totalFen*300);
            html+='<div style="margin-top:10px;padding:10px;background:rgba(255,255,255,0.2);border-radius:8px;"><div>合計: '+totalFen.toFixed(1)+' 分</div><div style="font-size:18px;font-weight:bold;">$'+totalPrice.toLocaleString()+'</div></div>';
            list.innerHTML=html;
            document.getElementById('totalPrice').innerText='$'+totalPrice.toLocaleString();
        }
        
        function getLocation(){
            if(navigator.geolocation){
                navigator.geolocation.getCurrentPosition(function(pos){
                    var lat=pos.coords.latitude,lng=pos.coords.longitude;
                    map.setView([lat,lng],18);
                    L.marker([lat,lng]).addTo(map).bindPopup('您的位置').openPopup();
                },function(){alert('無法取得位置');});
            }
        }
        
        function submitOrder(){
            if(selectedLands.length===0){alert('請先選擇土地');return;}
            var name=document.getElementById('name').value;
            var phone=document.getElementById('phone').value;
            if(!name||!phone){alert('請填寫姓名和電話');return;}
            var totalFen=selectedLands.reduce(function(s,l){return s+l.area/293.4;},0);
            var totalPrice=Math.round(totalFen*300);
            alert('📢 農噴媒合需求\n\n姓名: '+name+'\n電話: '+phone+'\n土地: '+selectedLands.map(function(l){return l.landNo;}).join(', ')+'\n總面積: '+totalFen.toFixed(1)+' 分\n總費用: $'+totalPrice.toLocaleString()+'\n\n已收到！');
        }
    </script>
</body>
</html>
